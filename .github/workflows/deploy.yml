name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual deployments

env:
  # Configure these for your deployment environment
  DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  # Only deploy if tests pass
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: sqlite, pdo_sqlite
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Pull latest changes
            git pull origin main

            # Install dependencies
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            npm ci
            npm run build

            # Run migrations
            php artisan migrate --force

            # Clear cache
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            # Restart queue workers if using queues
            # php artisan queue:restart

            echo "✅ Deployment completed successfully!"

      - name: Notify on success
        if: success()
        run: echo "✅ Deployment successful on commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed on commit ${{ github.sha }}"
          exit 1
